name: Scrape Rockwall County

# Cron disabled because Rockwall's site blocks GitHub IPs (returns 403).
# This scraper runs from the Mac instead via the local update_rockwall.command script.
# This workflow is kept around for manual triggering only (e.g. if Rockwall ever
# lifts the IP block, or if you set up a VPS later).
on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Number of days to look back'
        default: '14'
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install httpx beautifulsoup4
      - name: Run scraper
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '14' }}
        run: python scraper/fetch.py
      - name: Commit data outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/records.json data/ghl_export.csv dashboard/records.json
          git diff --cached --quiet || git commit -m "Update Rockwall County records"
          git push
